name: Keep Seismic Risk Engine Warm

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  wake-app:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Playwright and Chromium
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Open Seismic Risk Engine in browser
        env:
          APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "ERROR: STREAMLIT_APP_URL secret is missing."
            exit 1
          fi

          node <<'JSEOF'
          const { chromium } = require("playwright");
          (async () => {
            const url = process.env.APP_URL;
            console.log(`Waking up: ${url}`);
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            try {
              await page.goto(url, { waitUntil: "networkidle", timeout: 60000 });
              await page.waitForTimeout(20000);
              const title = await page.title();
              console.log(`Page title: ${title}`);
              console.log("Seismic Risk Engine kept alive successfully.");
            } catch (err) {
              console.error("Failed to load app:", err.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          JSEOF
